name: Ejecutar Practicas Python

on:
  push:
    branches: ["Modulo2"]
  workflow_dispatch:

jobs:
  run-python:

    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Ejecutar practicas
        run: |
          python "1.-Practica Numeros.py"
          python "2.-Practica Comentarios.py"
          python "3.-Practica Introduccion a las funciones.py"
          python "4.-FuncionesPers.py"
          python "5.-TiposDeArg.py"
          python "6.-Funciones_Propias.py"
          python "7.-Operadores-Aritmeticos.py"
          python "8.-oper-asig-bol.py"
          python "9.-Oper-id-pert-logig.py"
          python "10.-Calculadora-Calorias.py"
